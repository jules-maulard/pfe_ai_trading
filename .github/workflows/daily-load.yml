name: Daily Market Data Load

on:
  schedule:
    - cron: "0 2 * * 2-6"   # Tue-Sat at 02:00 UTC (previous day's close data)
  workflow_dispatch: {}       # allow manual trigger

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
  SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
  SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}

jobs:
  load-ohlcv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Load OHLCV data
        run: python -m src.data.market_data_pipeline --profile daily_ohlcv

  compute-rsi:
    runs-on: ubuntu-latest
    needs: load-ohlcv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compute RSI
        run: python -m src.data.market_data_pipeline --profile daily_rsi

  compute-macd:
    runs-on: ubuntu-latest
    needs: load-ohlcv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compute MACD
        run: python -m src.data.market_data_pipeline --profile daily_macd

  compute-pivot:
    runs-on: ubuntu-latest
    needs: load-ohlcv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compute Pivot Points
        run: python -m src.data.market_data_pipeline --profile daily_pivot

  load-fundamentals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Load Fundamentals data
        run: python -m src.data.market_data_pipeline --profile daily_fundamentals
